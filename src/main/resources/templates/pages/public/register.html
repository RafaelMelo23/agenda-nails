<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main-layout}">
<head>
    <title>Criar Conta</title>
    <link rel="stylesheet" th:href="@{/css/pages/register.css}">
</head>
<body>

<main layout:fragment="content">
    <div class="auth-wrapper">
        <div class="register-container">
            <div class="brand-section">
                <div class="brand-logo">✨</div>
                <h1 class="brand-title">Crie sua conta</h1>
                <p class="brand-subtitle">Preencha seus dados para agendar e gerenciar seus horários</p>
            </div>

            <form id="register-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="fullname" class="form-label">Nome Completo</label>
                        <input type="text" id="fullname" name="name" class="form-input" placeholder="Ex: Maria Silva" required>
                    </div>

                    <div class="form-group">
                        <label for="phone" class="form-label">Celular (WhatsApp)</label>
                        <input type="tel" id="phone" name="phone" class="form-input" placeholder="(00) 00000-0000" maxlength="15" required>
                    </div>

                    <div class="form-group">
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" id="email" name="email" class="form-input" placeholder="exemplo@email.com" required>
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Senha</label>
                        <input type="password" id="password" name="password" class="form-input" placeholder="No mínimo 8 caracteres" minlength="8" required>
                    </div>

                    <div class="form-group">
                        <label for="confirm-password" class="form-label">Confirmar Senha</label>
                        <input type="password" id="confirm-password" class="form-input" placeholder="Repita a senha" required>
                    </div>
                </div>

                <label class="terms-check">
                    <input type="checkbox" required>
                    <span>Li e concordo com os <a href="#">Termos de Uso</a> e a <a href="#">Política de Privacidade</a>.</span>
                </label>

                <button type="submit" class="btn btn-primary btn-block" id="btn-register">Cadastrar</button>
            </form>

            <div class="card-footer">
                Já possui uma conta? <br>
                <a th:href="@{/entrar}">Fazer Login</a>
            </div>
        </div>
    </div>
</main>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/pages/register.js}"></script>
</th:block>

</body>
</html>
