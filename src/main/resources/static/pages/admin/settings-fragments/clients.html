<!-- Clientes Section -->
<section id="tab-clients" class="admin-section tab-content">
    <div class="section-header">
        <h2>Gestão de Clientes</h2>
    </div>

    <div class="card overflow-hidden" style="margin-bottom: 20px;">
        <div style="padding: 15px 20px; border-bottom: 1px solid var(--border); background: #f9f9f9; display: flex; justify-content: flex-end;">
            <div class="search-box" style="width: 100%; max-width: 300px;">
                <input type="text" class="form-input" id="client-search" placeholder="Buscar cliente..." oninput="adminSettingsApp.debounceSearchClients()">
            </div>
        </div>
        <table class="admin-table">
            <thead>
            <tr>
                <th>Nome</th>
                <th>Telefone</th>
                <th>Histórico</th>
                <th>Ação</th>
            </tr>
            </thead>
            <tbody id="clients-list">
            <tr>
                <td colspan="4" class="empty-state">Carregando clientes...</td>
            </tr>
            </tbody>
        </table>
        <div id="clients-pagination" class="pagination"></div>
    </div>

    <!-- Client CRM -->
    <div class="card settings-card">
        <h3 class="settings-subtitle">Consultar Cliente (CRM)</h3>
        <div class="form-grid">
            <div class="form-group full-width">
                <label class="form-label">Selecione o Cliente</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="crm-client-search" class="form-input" placeholder="Buscar pelo nome ou telefone..." oninput="adminSettingsApp.debounceSearchCrmClients()">      
                </div>
                <div id="crm-client-results" style="margin-top: 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); max-height: 200px; overflow-y: auto; display: none;">
                    <!-- Dropdown results -->
                </div>
            </div>
        </div>

        <div id="crm-client-details" style="display: none; margin-top: 20px;">
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label">Nome</label>
                    <div class="form-input" id="crm-name" style="background: var(--bg-body);"></div>
                </div>
                <div class="form-group">
                    <label class="form-label">Telefone</label>
                    <div class="form-input" id="crm-phone" style="background: var(--bg-body);"></div>
                </div>
                <div class="form-group">
                    <label class="form-label">Total Gasto</label>
                    <div class="form-input" id="crm-total-spent" style="background: var(--bg-body); font-weight: bold; color: var(--primary);"></div>
                </div>
                <div class="form-group">
                    <label class="form-label">Última Visita</label>
                    <div class="form-input" id="crm-last-visit" style="background: var(--bg-body);"></div>
                </div>
                <div class="form-group">
                    <label class="form-label">Agendamentos Concluídos</label>
                    <div class="form-input" id="crm-completed" style="background: var(--bg-body); color: var(--status-avail);"></div>
                </div>
                <div class="form-group">
                    <label class="form-label">Agendamentos Cancelados</label>
                    <div class="form-input" id="crm-canceled" style="background: var(--bg-body); color: var(--status-part);"></div>
                </div>
                <div class="form-group">
                    <label class="form-label">Faltas (No-Show)</label>
                    <div class="form-input" id="crm-missed" style="background: var(--bg-body); color: var(--status-busy);"></div>
                </div>
            </div>
        </div>
    </div>
</section>
