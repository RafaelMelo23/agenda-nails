<div id="tab-overview" class="tab-content">
    <div class="card overview-card">
        <div class="card-header overview-header">
            <h3>Visão Geral e Histórico</h3>
            <p>Consulte todos os seus agendamentos com filtros por data e status.</p>
        </div>
        <div class="card-body overview-body">
            <div class="filters-grid">
                <div class="form-group">
                    <label class="form-label">Status</label>
                    <select id="filter-ov-status" class="form-input">
                        <option value="">Todos os Status</option>
                        <option value="PENDING">Pendente</option>
                        <option value="CONFIRMED">Confirmado</option>
                        <option value="FINISHED">Finalizado</option>
                        <option value="CANCELLED">Cancelado</option>
                        <option value="MISSED">Faltou</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Data</label>
                    <input type="date" id="filter-ov-date" class="form-input">
                </div>
                <div class="filter-actions">
                    <button class="btn btn-primary btn-filter" onclick="professionalScheduleApp.loadOverview(0)">Filtrar</button>
                </div>
            </div>

            <div class="table-responsive">
                <table class="app-table">
                    <thead>
                        <tr>
                            <th>Data/Hora</th>
                            <th>Cliente</th>
                            <th>Serviço</th>
                            <th>Valor</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="overview-list">
                        <tr><td colspan="5" class="empty-state">Clique em filtrar para carregar seus agendamentos.</td></tr>
                    </tbody>
                </table>
            </div>
            <div id="overview-pagination" class="pagination-container"></div>
        </div>
    </div>
</div>
